    <div id="root"></div>
    <script>
      (function(){
        // Only load the dev entry when a production build asset is not present.
        // In production Vite injects a built module script under /assets/, so
        // avoid requesting /src/main.tsx which would cause a 200 HTML response
        // and break strict MIME module checks in browsers and Lighthouse.
        function loadDevEntry(){
          var s = document.createElement('script');
          s.type = 'module';
          s.src = '/src/main.tsx';
          document.body.appendChild(s);
        }
        var hasBuiltModule = !!document.querySelector('script[type="module"][src*="/assets/"]');
        if (!hasBuiltModule) {
          if ('requestIdleCallback' in window) requestIdleCallback(loadDevEntry, {timeout:200});
          else window.addEventListener('load', function(){ setTimeout(loadDevEntry, 200); });
        }
      })();
    </script>
    <!-- Analytics - Conditionally loaded via environment variables -->
    <script type="module">
      if (import.meta.env.VITE_ANALYTICS_ENDPOINT && import.meta.env.VITE_ANALYTICS_WEBSITE_ID) {
        const script = document.createElement('script');
        script.defer = true;
        script.src = `${import.meta.env.VITE_ANALYTICS_ENDPOINT}/umami`;
        script.setAttribute('data-website-id', import.meta.env.VITE_ANALYTICS_WEBSITE_ID);
        document.body.appendChild(script);
      }
    </script>
  </body>
