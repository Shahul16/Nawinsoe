name: Generate Brand Assets

on:
  workflow_dispatch: {}
  push:
    branches: [ main, master ]

jobs:
  generate:
    name: Generate and commit brand assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run asset generators
        run: |
          pnpm run generate:assets || true
          pnpm run generate:avif || true
          pnpm run generate:woff2 || true

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/public/manus-storage || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: add generated brand assets [skip ci]" || echo "no changes to commit"
            git push
          else
            echo "No generated assets changes"
          fi
